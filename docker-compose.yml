services:
  backend:
    build: ./backend
    container_name: yoto-bridge
    # Backend non exposé sur le LAN : tout passe par le frontend (nginx) qui
    # proxifie /api, /stream et /docs. Bind local pour debug sur l'hôte.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # La base et les logs sont persistés dans le volume monté.
      YOTO_DATABASE_URL: "sqlite+aiosqlite:///./data/yoto_bridge.sqlite"
      YOTO_SYNC_INTERVAL_SECONDS: "3600"
      YOTO_STREAM_DEFAULT_BITRATE: "192"
      # Auth OIDC optionnelle. Les valeurs sensibles viennent du fichier .env
      # placé à côté de ce compose (jamais commité).
      YOTO_AUTH_ENABLED: "${YOTO_AUTH_ENABLED:-false}"
      YOTO_OIDC_ISSUER_URL: "${YOTO_OIDC_ISSUER_URL:-}"
      YOTO_OIDC_CLIENT_ID: "${YOTO_OIDC_CLIENT_ID:-}"
      YOTO_OIDC_CLIENT_SECRET: "${YOTO_OIDC_CLIENT_SECRET:-}"
      YOTO_OIDC_SCOPES: "${YOTO_OIDC_SCOPES:-openid profile email}"
      YOTO_SESSION_SECRET: "${YOTO_SESSION_SECRET:-}"
      # URL publique : sert aux URLs /stream déposées sur la Yoto ET au
      # redirect OAuth. DOIT correspondre au domaine réel + au Callback URL
      # déclaré dans le portail dev Yoto.
      YOTO_PUBLIC_BASE_URL: "https://yotobridge.crvsk.me"
    volumes:
      # Chemin absolu et stable en prod (hors dossier synchronisé par Arcane),
      # sinon la base repart à zéro à chaque sync. Défaut ./data pour le dev.
      - "${YOTO_DATA_DIR:-./data}:/app/data"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: yoto-bridge-web
    ports:
      - "${YOTO_WEB_PORT:-8081}:80"
    depends_on:
      - backend
    restart: unless-stopped
